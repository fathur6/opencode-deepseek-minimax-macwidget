name: OpencodeWidgetApp
options:
  bundleIdPrefix: com.opencode.widget
  deploymentTarget:
    macOS: "14.0"

targets:
  OpencodeWidgetApp:
    type: application
    platform: macOS
    sources:
      - Sources/OpencodeWidgetApp
      - Sources/OpencodeWidgetShared
      - path: OpencodeWidgetApp/Resources
        type: folder
      - path: OpencodeWidgetApp/AppIcon.icns
        buildPhase: resources
    dependencies: []
    info:
      path: OpencodeWidgetApp/Info.plist
      properties:
        CFBundleIconFile: AppIcon
        LSUIElement: false
    entitlements:
      path: OpencodeWidgetApp/Entitlements.plist
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.opencode.widget.app
      CODE_SIGN_STYLE: Automatic

